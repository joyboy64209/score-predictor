version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: match-predictor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-predictor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-predictor}
      POSTGRES_DB: ${POSTGRES_DB:-match_predictor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-predictor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: match-predictor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-predictor}:${POSTGRES_PASSWORD:-predictor}@postgres:5432/${POSTGRES_DB:-match_predictor}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ML_SERVICE_URL: http://ml:8000
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"

  ml:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ml
    container_name: match-predictor-ml
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-predictor}:${POSTGRES_PASSWORD:-predictor}@postgres:5432/${POSTGRES_DB:-match_predictor}?schema=public
      BACKEND_URL: http://backend:3001
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: match-predictor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
